format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - GOTOOLCHAIN: auto

tools:
  golang: 1.26:latest

workflows:

  # ── Quality gate ──────────────────────────────────────────────────────────
  # Run on every pull request targeting main.
  # Checks dependency hygiene, formatting, static analysis, linting, and tests.
  test:
    triggers:
      pull_request:
        - target_branch: main
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}

      - script@1:
          title: Set env vars for Go caching
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                envman add --key GO_BUILD_CACHE_PATH --value "$(go env GOCACHE)"
                envman add --key GO_MOD_CACHE_PATH --value "$(go env GOMODCACHE)"
                envman add --key GOLANGCI_LINT_CACHE --value "${HOME}/.cache/golangci-lint"

      - restore-cache@3:
          inputs:
            - key: |
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}

      - script@1:
          title: Verify dependencies
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go mod verify
                go mod tidy
                git diff --exit-code go.mod
                [ ! -f go.sum ] || git diff --exit-code go.sum

      - script@1:
          title: Check formatting
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                unformatted=$(gofmt -l .)
                if [ -n "$unformatted" ]; then
                  echo "The following files are not gofmt-formatted:"
                  echo "$unformatted"
                  exit 1
                fi

      - script@1:
          title: Static analysis
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go vet ./...

      - script@1:
          title: Lint
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make lint

      - script@1:
          title: Check generated CLI docs
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make docs-check

      - script@1:
          title: Run tests
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go test \
                  -race \
                  -count=1 \
                  -timeout=5m \
                  ./...

      - save-cache@1:
          inputs:
            - key: go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
            - paths: |-
                $GO_BUILD_CACHE_PATH
                $GO_MOD_CACHE_PATH
                $GOLANGCI_LINT_CACHE
            - is_key_unique: 'true'

      - deploy-to-bitrise-io@2: {}

  # ── Release ───────────────────────────────────────────────────────────────
  # Triggered by semver tag pushes (vX.Y.Z). GoReleaser cross-compiles every
  # supported platform (.goreleaser.yaml is the source of truth) and publishes
  # a *draft* GitHub release with archives + checksums; a human reviews the
  # generated notes and clicks publish.
  release:
    triggers:
      tag:
        - name: "v*.*.*"
    envs:
      # GoReleaser reads GITHUB_TOKEN to create the release; the token needs
      # contents:write on this repo. Configure it as a secret on the app.
      - GITHUB_TOKEN: $GIT_BOT_USER_ACCESS_TOKEN
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8:
          inputs:
            # GoReleaser resolves the version from the checked-out tag.
            - fetch_tags: "yes"

      - script@1:
          title: Set env vars for Go caching
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                envman add --key GO_BUILD_CACHE_PATH --value "$(go env GOCACHE)"
                envman add --key GO_MOD_CACHE_PATH --value "$(go env GOMODCACHE)"

      - restore-cache@3:
          inputs:
            - key: |
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}

      - script@1:
          title: GoReleaser (build all platforms + draft GitHub release)
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make release-ci

      - save-cache@1:
          inputs:
            - key: go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
            - paths: |-
                $GO_BUILD_CACHE_PATH
                $GO_MOD_CACHE_PATH
            - is_key_unique: 'true'

  # ── Snapshot build (manual) ───────────────────────────────────────────────
  # No triggers — start it from the Bitrise UI when you need ad-hoc binaries
  # for every platform without tagging or publishing anything. Uses the same
  # GoReleaser config as the real release; artifacts land on the build's
  # Artifacts tab.
  snapshot:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8:
          inputs:
            - fetch_tags: "yes"

      - script@1:
          title: Set env vars for Go caching
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                envman add --key GO_BUILD_CACHE_PATH --value "$(go env GOCACHE)"
                envman add --key GO_MOD_CACHE_PATH --value "$(go env GOMODCACHE)"

      - restore-cache@3:
          inputs:
            - key: |
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}

      - script@1:
          title: GoReleaser snapshot (build all platforms, no publish)
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make release-snapshot
                # Stage the archives + checksums for the Artifacts tab.
                if [ -n "${BITRISE_DEPLOY_DIR:-}" ]; then
                  cp dist/*.tar.gz dist/*.zip dist/checksums.txt "$BITRISE_DEPLOY_DIR"/ 2>/dev/null || true
                  ls -lh "$BITRISE_DEPLOY_DIR"
                fi

      - save-cache@1:
          inputs:
            - key: go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
            - paths: |-
                $GO_BUILD_CACHE_PATH
                $GO_MOD_CACHE_PATH
            - is_key_unique: 'true'

      - deploy-to-bitrise-io@2: {}
