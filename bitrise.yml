format_version: "13"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

app:
  envs:
    - GOTOOLCHAIN: auto

tools:
  golang: 1.26:latest

workflows:

  # ── Quality gate ──────────────────────────────────────────────────────────
  # Run on every push and pull request.
  # Checks dependency hygiene, formatting, static analysis, linting, and tests.
  test:
    triggers:
      push:
        - branch: main
      pull_request:
        - target_branch: main
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}

      - script@1:
          title: Set env vars for Go caching
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                envman add --key GO_BUILD_CACHE_PATH --value "$(go env GOCACHE)"
                envman add --key GO_MOD_CACHE_PATH --value "$(go env GOMODCACHE)"
                envman add --key GOLANGCI_LINT_CACHE --value "${HOME}/.cache/golangci-lint"

      - restore-cache@3:
          inputs:
            - key: |
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}

      - script@1:
          title: Verify dependencies
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go mod verify
                go mod tidy
                git diff --exit-code go.mod
                [ ! -f go.sum ] || git diff --exit-code go.sum

      - script@1:
          title: Check formatting
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                unformatted=$(gofmt -l .)
                if [ -n "$unformatted" ]; then
                  echo "The following files are not gofmt-formatted:"
                  echo "$unformatted"
                  exit 1
                fi

      - script@1:
          title: Static analysis
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go vet ./...

      - script@1:
          title: Lint
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make lint

      - script@1:
          title: Check generated CLI docs
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                make docs-check

      - script@1:
          title: Run tests
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                go test \
                  -race \
                  -count=1 \
                  -timeout=5m \
                  ./...

      - save-cache@1:
          inputs:
            - key: go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
            - paths: |-
                $GO_BUILD_CACHE_PATH
                $GO_MOD_CACHE_PATH
                $GOLANGCI_LINT_CACHE
            - is_key_unique: 'true'

      - deploy-to-bitrise-io@2: {}

  # ── Release build ─────────────────────────────────────────────────────────
  # Run on the main branch or tags.
  # Cross-compiles binaries for all supported platforms and uploads them.
  build:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}

      - script@1:
          title: Set env vars for Go caching
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail
                envman add --key GO_BUILD_CACHE_PATH --value "$(go env GOCACHE)"
                envman add --key GO_MOD_CACHE_PATH --value "$(go env GOMODCACHE)"

      - restore-cache@3:
          inputs:
            - key: |
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
                go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}

      - script@1:
          title: Cross-compile binaries
          inputs:
            - content: |
                #!/usr/bin/env bash
                set -xeuo pipefail

                APP_NAME="bitrise-cli"
                VERSION="${BITRISE_GIT_TAG:-$(git rev-parse --short HEAD)}"
                # releaseBuild=true hides the non-GA (stub) command namespaces
                # from --help and completion in shipped binaries. The gated
                # set lives in nonGACommands() in cmd/root.go.
                LDFLAGS="-s -w -X github.com/bitrise-io/bitrise-cli/cmd.version=${VERSION} -X github.com/bitrise-io/bitrise-cli/cmd.releaseBuild=true"
                if [ -n "${BITRISE_BUILD_URL:-}" ]; then
                  OUT_DIR="${BITRISE_DEPLOY_DIR}"
                else
                  OUT_DIR="${BITRISE_SOURCE_DIR}/.bin"
                fi
                mkdir -p "$OUT_DIR"

                platforms=(
                  "linux/amd64"
                  "darwin/amd64"
                  "darwin/arm64"
                  "windows/amd64"
                )

                for platform in "${platforms[@]}"; do
                  GOOS="${platform%/*}"
                  GOARCH="${platform#*/}"
                  out="${OUT_DIR}/${APP_NAME}-${VERSION}-${GOOS}-${GOARCH}"
                  [ "$GOOS" = "windows" ] && out="${out}.exe"

                  echo "Building ${GOOS}/${GOARCH}..."
                  GOOS="$GOOS" GOARCH="$GOARCH" go build \
                    -trimpath \
                    -ldflags="$LDFLAGS" \
                    -o "$out" \
                    .
                done

                echo "Built binaries:"
                ls -lh "$OUT_DIR"

      - save-cache@1:
          inputs:
            - key: go-cache-{{ .Workflow }}-{{ .OS }}-{{ .Arch }}-{{ checksum "go.sum" }}
            - paths: |-
                $GO_BUILD_CACHE_PATH
                $GO_MOD_CACHE_PATH
            - is_key_unique: 'true'

      - deploy-to-bitrise-io@2: {}
